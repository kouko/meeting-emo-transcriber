# metr config.yaml
# -------------------------------------------------------
# Place this file at: <speakers-dir>/_metr/config.yaml (e.g. ~/metr-speakers/_metr/config.yaml)
# Settings here serve as defaults; CLI flags override them.
# Only explicitly-set CLI flags will update this file.
# -------------------------------------------------------

# ASR language (default: "auto")
# Determines which whisper model to use:
#   "auto"  -> ggml-large-v3 (multilingual, auto-detect)
#   "en"    -> ggml-large-v3
#   "zh-TW" -> ggml-breeze-asr-25-q5k (Traditional Chinese, optimized)
#   "zh"    -> ggml-belle-zh (Simplified Chinese)
#   "ja"    -> ggml-kotoba-whisper-v2.0 (Japanese)
language: "auto"

# Diarization clustering threshold (default: 0.80)
# Controls how aggressively speakers are split during diarization.
#   Higher value (e.g. 0.9) -> more speakers detected (finer splitting)
#   Lower value  (e.g. 0.5) -> fewer speakers detected (more merging)
# Range: 0.0 - 1.0
threshold: 0.80

# Speaker matching threshold, cosine similarity (default: 0.55)
# Used when matching diarized clusters to enrolled speaker profiles.
#   Higher value (e.g. 0.7) -> stricter matching, fewer false positives
#   Lower value  (e.g. 0.4) -> more lenient, may match wrong speakers
# Range: 0.0 - 1.0
match_threshold: 0.55

# Output format (default: "txt")
# Supported: "txt", "json", "srt", "all" (generates all three)
# Comma-separated for multiple: "txt,json"
format: "txt"

# Custom vocabulary / context hints for ASR (default: empty)
# Improves recognition of proper nouns, technical terms, etc.
# Each entry is passed to whisper's --prompt as comma-separated hints.
# CLI --prompt values are merged with this list (no duplicates).
vocabulary: []
#   - "Alice"
#   - "ACME Corp"
